schema_version: 1

context:
  python_min: "3.11"
  version: "0.2.0"

package:
  name: signurlarity
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/signurlarity/signurlarity-${{ version }}.tar.gz
  sha256: 6925f9dbc5d03b1b5beb4747c337137b401a6cbdd4f622f2f4c9d61a7a5bc4bb

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.24.0
    - orjson
    - cryptography >=41.0.0

tests:
  - python:
      imports:
        - signurlarity
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Lightweight library to presign URLs compatible with boto3
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/diracx/signurlarity

extra:
  recipe-maintainers:
    - chaen
    - chrisburr
